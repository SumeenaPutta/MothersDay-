<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Mother's Day ❤️</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:white;
}

.container{
    display:none;
}

button{
    padding:15px 30px;
    font-size:20px;
    border:none;
    border-radius:30px;
    background:white;
    color:#ff4b6e;
    cursor:pointer;
}

img{
    width:250px;
    height:250px;
    object-fit:cover;
    border-radius:50%;
    margin-top:20px;
    border:5px solid white;
}

h1{
    font-size:40px;
}

p{
    font-size:20px;
    max-width:400px;
}
</style>

</head>

<body>

<div id="start">
    <h1>💖 Happy Mother's Day 💖</h1>
    <p>Click the button to see a special surprise</p>
    <button onclick="showMessage()">Open</button>
</div>

<div class="container" id="message">
    <h1>Happy Mother's Day Mom ❤️</h1>

    <!-- Replace photo.jpg with your photo -->
    <img src="photo.jpg">

    <p>
    Thank you for your endless love, care and support.  
    You are the most beautiful part of my life.  
    I love you forever Mom 💐
    </p>
</div>

<script>
function showMessage(){
    document.getElementById("start").style.display="none";
    document.getElementById("message").style.display="block";
}
</script>

</body>
</html>
