<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Mother's Day ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: 'Segoe UI', sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff758c,#ff7eb3,#ffb199);
overflow:hidden;
color:white;
text-align:center;
}

/* floating hearts */

.heart{
position:absolute;
bottom:-20px;
font-size:20px;
animation:float 6s infinite;
opacity:0.6;
}

@keyframes float{
0%{transform:translateY(0);}
100%{transform:translateY(-110vh);}
}

/* card */

.card{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(10px);
padding:40px;
border-radius:20px;
box-shadow:0 15px 35px rgba(0,0,0,0.2);
max-width:420px;
transition:0.5s;
}

/* button */

button{
margin-top:20px;
padding:14px 28px;
border:none;
border-radius:30px;
font-size:18px;
cursor:pointer;
background:white;
color:#ff4b6e;
font-weight:bold;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

/* photo */

.photo-frame{
margin-top:20px;
width:260px;
height:260px;
border-radius:20px;
overflow:hidden;
border:6px solid white;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.photo-frame img{
width:100%;
height:100%;
object-fit:cover;
}

/* hidden section */

#message{
display:none;
animation:fade 2s;
}

@keyframes fade{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

p{
margin-top:15px;
font-size:18px;
line-height:1.5;
}

</style>
</head>

<body>

<!-- floating hearts -->
<div class="heart" style="left:10%">❤️</div>
<div class="heart" style="left:25%">💖</div>
<div class="heart" style="left:40%">💗</div>
<div class="heart" style="left:60%">💞</div>
<div class="heart" style="left:80%">💓</div>

<div class="card">

<div id="start">
<h1>💐 Happy Mother's Day 💐</h1>
<p>A small surprise for the most special person in my life</p>
<button onclick="showMessage()">Open My Message ❤️</button>
</div>

<div id="message">

<h1>Happy Mother's Day Mom ❤️</h1>

<div class="photo-frame">
<img src="photo.jpg">
</div>

<p>
Mom, thank you for your endless love, patience and support.  
You are my biggest blessing and my forever hero.  
I love you so much 💖
</p>

</div>

</div>

<script>

function showMessage(){
document.getElementById("start").style.display="none";
document.getElementById("message").style.display="block";
}

</script>

</body>
</html>
